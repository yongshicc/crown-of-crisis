<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="container">
    <span class="site-name" id="site-logo"></span>
    <nav><ul id="nav-list"></ul></nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="orbit orbit-1"></div>
  <div class="orbit orbit-2"></div>
  <div class="container">
    <h1 id="hero-tagline"></h1>
    <div class="hero-right">
      <p id="hero-intro"></p>
      <a class="featured-link" href="work.html">Peruse my portfolio →</a>
    </div>
  </div>
</section>

<!-- FEATURED WORK -->
<section class="alt reveal">
  <div class="container">
    <h2>Featured Work</h2>
    <div class="portfolio-grid" id="portfolio-grid"></div>
    <p class="section-note" id="portfolio-note"></p>
    <a class="featured-link" href="work.html">See the portfolio →</a>
  </div>
</section>

<!-- ABOUT -->
<section class="reveal">
  <div class="container">
    <div class="about-grid">
      <h1 id="about-heading"></h1>
      <div>
        <p class="section-note" id="about-body"></p>
        <br>
        <a class="featured-link" href="about.html">More about me →</a>
      </div>
    </div>
  </div>
</section>

<!-- INTERVIEWS & ARTICLES -->
<section class="alt reveal">
  <div class="container">
    <h2>Recent Interviews &amp; Articles</h2>
    <ul class="interview-list" id="interview-list"></ul>
  </div>
</section>

<!-- CONTACT -->
<section class="reveal">
  <div class="container contact-block">
    <h1 id="contact-heading">Contact Me</h1>
    <p class="section-note" id="contact-body"></p>
    <a class="featured-link" id="contact-link"></a>
  </div>
</section>

<!-- STAY IN TOUCH -->
<section class="alt reveal">
  <div class="container">
    <h2>Stay in touch</h2>
    <div class="stay-grid">
      <div>
        <h4>Follow me elsewhere</h4>
        <ul class="social-list" id="social-list"></ul>
      </div>
      <div>
        <h4>Subscribe for updates</h4>
        <div class="newsletter-row">
          <input type="email" placeholder="name@example.com" />
          <button type="button">Subscribe</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container">
    <span class="site-name" id="footer-logo"></span>
    <nav><ul id="footer-nav"></ul></nav>
  </div>
</footer>

<!-- Script -->
<script src="main.js"></script>

</body>
</html>
